<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semester-Roadmap</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%8E%93</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #000000;
  --card: #0a0d14;
  --card-done: #05070a;
  --border: #1b2336;
  --text: #f4f6fb;
  --text-muted: #8e99b5;
  --text-faint: #627293;
  --pruefung: #ff5d5d;
  --pruefung-bg: rgba(255, 93, 93, 0.12);
  --abgabe: #38bdf8;
  --abgabe-bg: rgba(56, 189, 248, 0.12);
  --termin: #34d399;
  --termin-bg: rgba(52, 211, 153, 0.12);
  --amber: #f59e0b;
  --amber-bg: rgba(245, 158, 11, 0.12);
  --urgent: #ff5d5d;
  --done: #10b981;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  padding: clamp(1rem, 3vw, 2.5rem) clamp(0.5rem, 3vw, 2.5rem) 4rem;
  line-height: 1.5;
  -webkit-tap-highlight-color: transparent;
}

.display { font-family: 'Outfit', sans-serif; }
.container { max-width: 1480px; margin: 0 auto; }

/* Top-Grid */
.top-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0.85rem;
  margin-bottom: 1.4rem;
}
@media (min-width: 880px) {
  .top-grid { grid-template-columns: 0.82fr 1.18fr; align-items: stretch; }
}

/* Hero Card */
.hero {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.2rem 1.4rem;
  display: flex;
  align-items: center;
  gap: 1.1rem;
  animation: fadeInUp 0.55s ease both;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.hero.urgent {
  background: rgba(255, 93, 93, 0.06);
  border-color: rgba(255, 93, 93, 0.35);
  animation: fadeInUp 0.55s ease both, pulseRing 2.4s ease-in-out 0.6s infinite;
}
.hero-icon {
  width: 48px; height: 48px; flex-shrink: 0;
  border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
}
.hero-icon.pruefung { background: var(--pruefung-bg); }
.hero-icon.abgabe   { background: var(--abgabe-bg); }
.hero-icon.termin   { background: var(--termin-bg); }
.hero-text { min-width: 0; }
.hero-label { font-size: 0.72rem; color: var(--text-faint); margin-bottom: 0.15rem; text-transform: uppercase; letter-spacing: 0.04em; }
.hero-title { font-family: 'Outfit', sans-serif; font-size: clamp(1.05rem, 2vw, 1.18rem); font-weight: 700; }
.hero-meta { font-size: 0.82rem; color: var(--text-muted); margin-top: 0.15rem; }
.hero-days {
  margin-left: auto; text-align: right; flex-shrink: 0;
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: clamp(1rem, 2vw, 1.1rem);
  color: var(--amber);
}
.hero.urgent .hero-days { color: var(--urgent); }
.hero-empty { text-align: center; width: 100%; color: var(--done); font-size: 0.95rem; padding: 0.4rem 0; }

/* Timeline Container */
.timeline-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.1rem 1.25rem 1.25rem;
  display: flex; flex-direction: column; justify-content: center;
  animation: fadeInUp 0.55s ease both; animation-delay: 0.08s;
  overflow: hidden;
}
.timeline-title { 
  font-size: 0.78rem; 
  color: var(--text-muted); 
  font-weight: 500; 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
}

.timeline-scroll {
  overflow-x: auto;
  padding-top: 2.2rem;
  padding-bottom: 1.2rem;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.timeline-scroll::-webkit-scrollbar { display: none; }

.timeline-track {
  position: relative;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  min-width: 480px;
  margin: 0.8rem 0.8rem 0.5rem;
}
.timeline-progress {
  position: absolute; left: 0; top: 0; height: 100%;
  background: linear-gradient(90deg, var(--termin), var(--abgabe));
  border-radius: 2px;
  transition: width 1.1s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 1;
}

/* ASP Span — rendered below dots */
.timeline-asp-span {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  height: 16px;
  background: rgba(245, 158, 11, 0.1);
  border-top: 1.5px solid rgba(245, 158, 11, 0.38);
  border-bottom: 1.5px solid rgba(245, 158, 11, 0.38);
  border-radius: 3px;
  z-index: 2;
  pointer-events: none;
}
.timeline-asp-label {
  position: absolute;
  top: -1.7rem;
  font-size: 0.6rem;
  color: var(--amber);
  white-space: nowrap;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  z-index: 4;
}
/* Vertical tick marks for ASP start/end */
.timeline-asp-tick {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 1.5px;
  height: 20px;
  background: rgba(245, 158, 11, 0.5);
  border-radius: 1px;
  z-index: 3;
}

.timeline-dot {
  position: absolute; top: 50%; width: 12px; height: 12px;
  border-radius: 50%; transform: translate(-50%, -50%);
  border: 2px solid var(--card);
  cursor: pointer;
  z-index: 5;
}
.timeline-dot.enter { animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both; animation-delay: var(--delay, 0s); }
.timeline-dot.pruefung { background: var(--pruefung); }
.timeline-dot.abgabe   { background: var(--abgabe); }
.timeline-dot.termin   { background: var(--termin); }

.timeline-today {
  position: absolute; top: 50%; width: 2px; height: 22px;
  background: var(--text); transform: translate(-50%, -50%);
  animation: breathe 2.6s ease-in-out infinite;
  z-index: 6;
}
.timeline-today-label {
  position: absolute; top: -1.6rem; transform: translateX(-50%);
  font-size: 0.65rem; font-weight: 600; color: var(--text); white-space: nowrap;
  z-index: 6;
}
.timeline-month {
  position: absolute; bottom: -1.4rem; transform: translateX(-50%);
  font-size: 0.65rem; color: var(--text-faint);
}

.stats-line { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1rem; }
.stats-line b { color: var(--text); font-weight: 600; }

.pill {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'Inter', sans-serif;
  font-size: 0.75rem; font-weight: 500;
  padding: 0.35rem 0.75rem;
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.15s ease;
  flex-shrink: 0;
}
.pill:hover { border-color: #2d3954; color: var(--text); }
.pill:active { transform: scale(0.95); }
.pill.active {
  background: var(--text);
  border-color: var(--text);
  color: var(--bg);
  font-weight: 600;
  box-shadow: 0 0 12px rgba(255,255,255,0.2);
}

/* Dashboard-Liste */
.dashboard-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr));
  gap: 0.8rem;
}

.card {
  container-type: inline-size;
  container-name: card;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1rem 1.15rem;
  transition: transform 0.2s ease, border-color 0.2s ease;
}
.card.enter { animation: fadeInUp 0.45s ease both; animation-delay: var(--delay, 0s); }
.card:hover { border-color: #2d3a56; transform: translateY(-2px); }

.card.done { background: var(--card-done); border-color: #121722; opacity: 0.65; }
.card.done:hover { opacity: 0.85; transform: none; }
.card.done .title { text-decoration: line-through; color: var(--text-faint); }
.card.done .badge { background: rgba(255, 255, 255, 0.04); color: var(--text-faint); }

.card-inner { display: flex; justify-content: space-between; align-items: center; gap: 0.8rem; }
@container card (max-width: 340px) {
  .card-inner { flex-direction: column; align-items: flex-start; gap: 0.8rem; }
  .countdown { width: 100%; display: flex; justify-content: space-between; align-items: center; }
  .countdown .primary { display: inline; }
}

.card-left { display: flex; align-items: center; gap: 1rem; min-width: 0; width: 100%; }

.checkbox-wrapper { display: flex; align-items: center; justify-content: center; width: 22px; height: 22px; flex-shrink: 0; }
input[type="checkbox"] {
  appearance: none; -webkit-appearance: none;
  width: 20px; height: 20px;
  border: 2px solid var(--text-faint);
  border-radius: 6px;
  background: transparent;
  cursor: pointer;
  display: grid; place-content: center;
  margin: 0;
}
input[type="checkbox"]::before {
  content: ""; width: 10px; height: 10px;
  clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
  transform: scale(0);
  background-color: var(--bg);
  transition: transform 0.15s ease-in-out;
}
input[type="checkbox"]:checked {
  background-color: var(--abgabe);
  border-color: var(--abgabe);
  box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
}
input[type="checkbox"]:checked::before { transform: scale(1); }

.dot-marker { width: 6px; height: 6px; background: var(--text-faint); border-radius: 50%; flex-shrink: 0; margin: 0 8px; }

.info { display: flex; flex-direction: column; gap: 0.25rem; min-width: 0; }

.badge {
  font-family: 'Inter', sans-serif;
  font-size: 0.66rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
  padding: 0.15rem 0.45rem; border-radius: 5px; width: fit-content;
}
.badge.pruefung { background: var(--pruefung-bg); color: var(--pruefung); }
.badge.abgabe   { background: var(--abgabe-bg);   color: var(--abgabe); }
.badge.termin   { background: var(--termin-bg);   color: var(--termin); }

.title { font-family: 'Outfit', sans-serif; font-size: 1.02rem; font-weight: 600; word-break: break-word; }
.meta  { font-size: 0.8rem; color: var(--text-muted); }

.countdown {
  text-align: right; background: var(--bg); padding: 0.45rem 0.75rem;
  border-radius: 8px; border: 1px solid var(--border);
  min-width: 105px; flex-shrink: 0;
}
.countdown .primary   { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.9rem; display: block; }
.countdown .secondary { font-size: 0.72rem; color: var(--text-muted); }
.countdown.urgent { border-color: rgba(255, 93, 93, 0.4); background: rgba(255, 93, 93, 0.08); }
.countdown.urgent .primary { color: var(--urgent); }
.countdown.done-badge { background: rgba(16, 185, 129, 0.08); border-color: rgba(16, 185, 129, 0.3); text-align: center; }
.countdown.done-badge .primary   { color: var(--done); }
.countdown.done-badge .secondary { color: #34d399; }
.countdown.expired { opacity: 0.45; }

.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-faint); font-size: 0.9rem; grid-column: 1 / -1; }

/* =============================================
   CALENDAR VIEW
   ============================================= */
.calendar-section {
  margin-bottom: 1.2rem;
}
.calendar-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.25rem 1.25rem 1rem;
  animation: fadeInUp 0.38s ease both;
}
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  gap: 0.5rem;
}
.cal-nav-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  width: 32px; height: 32px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, background 0.15s;
  flex-shrink: 0;
  font-family: 'Inter', sans-serif;
}
.cal-nav-btn:hover  { border-color: #2d3954; background: #0f1420; }
.cal-nav-btn:active { transform: scale(0.92); }

.cal-month-label {
  font-family: 'Outfit', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  text-align: center;
  flex: 1;
}
.cal-asp-indicator {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  font-size: 0.7rem;
  color: var(--amber);
  background: rgba(245, 158, 11, 0.08);
  border: 1px solid rgba(245, 158, 11, 0.28);
  border-radius: 999px;
  padding: 0.18rem 0.55rem;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.cal-asp-dot-sm {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--amber);
  animation: breathe 2.4s ease-in-out infinite;
  flex-shrink: 0;
}

.cal-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.cal-scroll::-webkit-scrollbar { display: none; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(40px, 1fr));
  gap: 3px;
  min-width: 300px;
}
.cal-day-header {
  text-align: center;
  font-size: 0.64rem;
  color: var(--text-faint);
  padding: 0.3rem 0.15rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.cal-day {
  min-height: 80px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 7px;
  padding: 0.3rem 0.25rem;
  transition: border-color 0.15s;
  overflow: hidden;
}
.cal-day.other-month { opacity: 0.2; pointer-events: none; }
.cal-day.today { border-color: rgba(244, 246, 251, 0.22); }
.cal-day.asp-period {
  background: rgba(245, 158, 11, 0.06);
  border-color: rgba(245, 158, 11, 0.16);
}
.cal-day.asp-period.today {
  border-color: rgba(245, 158, 11, 0.5);
}
.cal-day.asp-start { border-left-color: rgba(245, 158, 11, 0.55); }
.cal-day.asp-end   { border-right-color: rgba(245, 158, 11, 0.55); }

.cal-day-num {
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--text-muted);
  line-height: 1.2;
  margin-bottom: 3px;
  min-width: 18px;
  display: inline-block;
}
.cal-day.today .cal-day-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 19px; height: 19px;
  border-radius: 50%;
  background: var(--text);
  color: var(--bg);
  font-weight: 700;
  font-size: 0.67rem;
}
.cal-event-tag {
  font-size: 0.6rem;
  padding: 3px 5px;
  border-radius: 4px;
  margin-top: 3px;
  white-space: normal;
  display: block;
  line-height: 1.3;
  word-break: break-word;
}
.cal-event-tag.pruefung { background: var(--pruefung-bg); color: var(--pruefung); }
.cal-event-tag.abgabe   { background: var(--abgabe-bg);   color: var(--abgabe); }
.cal-event-tag.termin   { background: var(--termin-bg);   color: var(--termin); }

.cal-legend {
  display: flex;
  gap: 0.7rem;
  flex-wrap: wrap;
  margin-top: 0.9rem;
  padding-top: 0.75rem;
  border-top: 1px solid var(--border);
  align-items: center;
}
.cal-legend-item {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.68rem;
  color: var(--text-muted);
}
.cal-legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.cal-legend-dot.pruefung { background: var(--pruefung); }
.cal-legend-dot.abgabe   { background: var(--abgabe); }
.cal-legend-dot.termin   { background: var(--termin); }
.cal-legend-asp-swatch {
  width: 18px; height: 8px; border-radius: 2px;
  background: rgba(245, 158, 11, 0.22);
  border: 1px solid rgba(245, 158, 11, 0.48);
  flex-shrink: 0;
}

/* Animations */
@keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
@keyframes popIn    { from { opacity: 0; transform: translate(-50%, -50%) scale(0.3); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
@keyframes pulseRing { 0%, 100% { box-shadow: 0 0 0 0 rgba(255, 93, 93, 0.25); } 50% { box-shadow: 0 0 0 6px rgba(255, 93, 93, 0); } }
@keyframes breathe  { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

<div class="container">
  <div class="top-grid">
    <div class="hero" id="hero"></div>
    <div class="timeline-card">
      <div class="timeline-title">
        <span>Semesterverlauf</span>
        <button class="pill" id="cal-toggle-btn">📅 Kalender</button>
      </div>
      <div class="timeline-scroll">
        <div id="timeline-container"></div>
      </div>
    </div>
  </div>

  <div id="calendar-section" class="calendar-section" style="display:none">
    <div class="calendar-card">
      <div class="cal-header">
        <button class="cal-nav-btn" id="cal-prev">‹</button>
        <div class="cal-month-label" id="cal-month-label"></div>
        <span class="cal-asp-indicator" id="cal-asp-indicator" style="display:none">

        </span>
        <button class="cal-nav-btn" id="cal-next">›</button>
      </div>
      <div class="cal-scroll">
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <div class="cal-legend">
        <div class="cal-legend-item"><div class="cal-legend-dot pruefung"></div>Prüfung</div>
        <div class="cal-legend-item"><div class="cal-legend-dot abgabe"></div>Abgabe</div>
        <div class="cal-legend-item"><div class="cal-legend-dot termin"></div>Termin</div>
        <div class="cal-legend-item"><div class="cal-legend-asp-swatch"></div>ASP-Zeitraum (07.09. – 09.10.)</div>
      </div>
    </div>
  </div>

  <div class="stats-line" id="stats-line"></div>
  <div class="dashboard-list" id="list"></div>
</div>

  const ASP_END   = '2026-10-09';
  const ICONS = { 'Prüfung': '📝', 'Abgabe': '📤', 'Termin': '📌' };
  const STORAGE_KEY = 'done_items_v1';

  let doneItems  = [];
  let calVisible = false;
  const _n = new Date();
  let calYear  = _n.getFullYear();
  let calMonth = _n.getMonth(); 

  async function loadDoneItems() {
    try {
      if (window.storage && typeof window.storage.get === 'function') {
        const r = await window.storage.get(STORAGE_KEY, false);
        doneItems = r ? JSON.parse(r.value) : [];
      } else {
        const r = localStorage.getItem(STORAGE_KEY);
        doneItems = r ? JSON.parse(r) : [];
      }
    } catch (e) { doneItems = []; }
  }

  async function saveDoneItems() {
    try {
      if (window.storage && typeof window.storage.set === 'function') {
        await window.storage.set(STORAGE_KEY, JSON.stringify(doneItems), false);
      } else {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(doneItems));
      }
    } catch (e) {}
  }

  function parseISOString(s) {
    const [y, m, d] = s.split('-').map(Number);
    return new Date(y, m - 1, d);
  }
  function midnight(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
  function typeClass(t) { return t === 'Prüfung' ? 'pruefung' : t === 'Abgabe' ? 'abgabe' : 'termin'; }
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function formatDate(d) {
    return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }

  window.toggleDone = function(id) {
    doneItems = doneItems.includes(id) ? doneItems.filter(x => x !== id) : [...doneItems, id];
    saveDoneItems();
    render(false);
  };

  function buildTimeline(todayMid, animate) {
    const mainEvents = events.filter(e => !e.calOnly);
    const allTimes = mainEvents.map(e => midnight(parseISOString(e.date)).getTime());
    let minT = Math.min(todayMid.getTime(), ...allTimes);
    let maxT = Math.max(...allTimes);
    const range = (maxT - minT) || 1;
    const pad   = range * 0.04;
    minT -= pad; maxT += pad;
    const span = maxT - minT;
    const posOf = t => ((t - minT) / span) * 100;

    const aspStartT = midnight(parseISOString(ASP_START)).getTime();
    const aspEndT   = midnight(parseISOString(ASP_END)).getTime();
    let aspHtml = '';
    if (aspEndT > minT && aspStartT < maxT) {
      const aspL = Math.max(0, posOf(aspStartT));
      const aspR = Math.min(100, posOf(aspEndT));
      const aspW = aspR - aspL;
      const midPct = (aspL + aspR) / 2;
      aspHtml = `
        <div class="timeline-asp-span" style="left:${aspL}%;width:${aspW}%"></div>
        <div class="timeline-asp-tick"  style="left:${aspL}%"></div>
        <div class="timeline-asp-tick"  style="left:${aspR}%"></div>
        <div class="timeline-asp-label" style="left:${midPct}%;transform:translateX(-50%)">ASP</div>
      `;
    }

    let dots = '';
    mainEvents.forEach((e, i) => {
      const t   = midnight(parseISOString(e.date)).getTime();
      const pct = posOf(t);
      const enterCls = animate ? 'enter' : '';
      const delay    = animate ? `--delay:${(0.2 + i * 0.04).toFixed(3)}s;` : '';
      dots += `<div class="timeline-dot ${typeClass(e.type)} ${enterCls}"
                    style="left:${pct}%;${delay}"
                    tabindex="0" role="img"
                    aria-label="${escapeHtml(e.type)}: ${escapeHtml(e.title)} am ${formatDate(parseISOString(e.date))}"
                    title="${escapeHtml(e.title)} – ${formatDate(parseISOString(e.date))}">
               </div>`;
    });

    const todayPct = posOf(todayMid.getTime());
    dots += `<div class="timeline-today" style="left:${todayPct}%"></div>`;
    dots += `<div class="timeline-today-label" style="left:${todayPct}%">Heute</div>`;

    let months = '';
    let cursor = new Date(minT);
    cursor = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
    if (cursor.getTime() < minT) cursor.setMonth(cursor.getMonth() + 1);
    let guard = 0;
    while (cursor.getTime() <= maxT && guard < 24) {
      const pct   = posOf(cursor.getTime());
      const label = cursor.toLocaleDateString('de-DE', { month: 'short', year: '2-digit' });
      months += `<div class="timeline-month" style="left:${pct}%">${label}</div>`;
      cursor.setMonth(cursor.getMonth() + 1);
      guard++;
    }

    const progressPct = Math.min(100, Math.max(0, todayPct));
    return {
      html: `<div class="timeline-track">
        <div class="timeline-progress" id="timeline-progress-bar" style="width:${animate ? 0 : progressPct}%"></div>
        ${aspHtml}
        ${months}
        ${dots}
      </div>`,
      targetPct: progressPct
    };
  }

  function renderHero(item, todayMid) {
    const el = document.getElementById('hero');
    if (!item) {
      el.className = 'hero';
      el.innerHTML = `<div class="hero-empty">Keine offenen Termine mehr – geschafft! 🎉</div>`;
      return;
    }
    const d        = parseISOString(item.date);
    const diffDays = Math.round((midnight(d) - todayMid) / 86400000);
    const urgent   = diffDays <= 7;
    el.className   = `hero ${urgent ? 'urgent' : ''}`;
    const daysLabel = diffDays === 0 ? 'Heute' : `in ${diffDays} Tag${diffDays !== 1 ? 'en' : ''}`;
    el.innerHTML = `
      <div class="hero-icon ${typeClass(item.type)}">${ICONS[item.type]}</div>
      <div class="hero-text">
        <div class="hero-label">Als Nächstes</div>
        <div class="hero-title">${escapeHtml(item.title)}</div>
        <div class="hero-meta">${formatDate(d)} · ${item.time}</div>
      </div>
      <div class="hero-days">${daysLabel}</div>
    `;
  }

  const MONTH_NAMES = ['Januar','Februar','März','April','Mai','Juni',
                       'Juli','August','September','Oktober','November','Dezember'];

  function toggleCalendar() {
    calVisible = !calVisible;
    document.getElementById('calendar-section').style.display = calVisible ? 'block' : 'none';
    document.getElementById('cal-toggle-btn').classList.toggle('active', calVisible);
    if (calVisible) renderCalendar();
  }

  function calNav(delta) {
    let nextMonth = calMonth + delta;
    let nextYear = calYear;
    if (nextMonth > 11) { nextMonth = 0; nextYear++; }
    if (nextMonth < 0)  { nextMonth = 11; nextYear--; }

    if (nextYear > 2026 || (nextYear === 2026 && nextMonth > 9)) return;

    calMonth = nextMonth;
    calYear = nextYear;
    renderCalendar();
  }

  function renderCalendar() {
    const aspStart = midnight(parseISOString(ASP_START));
    const aspEnd   = midnight(parseISOString(ASP_END));
    const today    = midnight(new Date());

    document.getElementById('cal-month-label').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;

    const isMaxDate = (calYear === 2026 && calMonth === 9);
    const nextBtn = document.getElementById('cal-next');
    nextBtn.style.opacity = isMaxDate ? '0.3' : '1';
    nextBtn.style.pointerEvents = isMaxDate ? 'none' : 'auto';

    const monthStart = new Date(calYear, calMonth, 1);
    const monthEnd   = new Date(calYear, calMonth + 1, 0);
    const aspOverlap = monthEnd >= aspStart && monthStart <= aspEnd;
    document.getElementById('cal-asp-indicator').style.display = aspOverlap ? 'inline-flex' : 'none';

    const byDate = {};
    events.forEach(e => {
      byDate[e.date] = byDate[e.date] || [];
      byDate[e.date].push(e);
    });

    const first = new Date(calYear, calMonth, 1);
    let start = new Date(first);
    let dow = start.getDay();
    if (dow === 0) dow = 7;
    start.setDate(start.getDate() - (dow - 1));

    let html = '';
    ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(d => {
      html += `<div class="cal-day-header">${d}</div>`;
    });

    let cur = new Date(start);
    for (let i = 0; i < 42; i++) {
      const curMid = midnight(cur);
      const iso    = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
      const inMonth = cur.getMonth() === calMonth;
      const isToday = curMid.getTime() === today.getTime();
      const inAsp   = curMid >= aspStart && curMid <= aspEnd;
      const isAspS  = curMid.getTime() === aspStart.getTime();
      const isAspE  = curMid.getTime() === aspEnd.getTime();

      let cls = 'cal-day';
      if (!inMonth) cls += ' other-month';
      if (isToday)  cls += ' today';
      if (inAsp)    cls += ' asp-period';
      if (isAspS)   cls += ' asp-start';
      if (isAspE)   cls += ' asp-end';

      const dayEvts = byDate[iso] || [];

      const numHtml = isToday
        ? `<div class="cal-day-num" style="display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:50%;background:var(--text);color:var(--bg);font-weight:700;font-size:0.67rem;">${cur.getDate()}</div>`
        : `<div class="cal-day-num">${cur.getDate()}</div>`;

      const tagsHtml = dayEvts.map(e => {
        return `<span class="cal-event-tag ${typeClass(e.type)}" title="${escapeHtml(e.title)}">${escapeHtml(e.title)}<br><span style="font-size:0.5rem; opacity:0.8; font-weight:500;">${escapeHtml(e.time)}</span></span>`;
      }).join('');

      html += `<div class="${cls}">${numHtml}${tagsHtml}</div>`;
      cur.setDate(cur.getDate() + 1);
    }

    document.getElementById('cal-grid').innerHTML = html;
  }

  function render(animate) {
    const today    = new Date();
    const todayMid = midnight(today);
    
    const mainEvents = events.filter(e => !e.calOnly);
    const sorted   = [...mainEvents].sort((a, b) => parseISOString(a.date) - parseISOString(b.date));

    const upcoming = sorted.filter(e => {
      const diff = Math.round((midnight(parseISOString(e.date)) - todayMid) / 86400000);
      return diff >= 0 && !(e.type === 'Abgabe' && doneItems.includes(e.id));
    });
    renderHero(upcoming[0], todayMid);

    const tl = buildTimeline(todayMid, animate);
    document.getElementById('timeline-container').innerHTML = tl.html;
    if (animate) {
      const bar = document.getElementById('timeline-progress-bar');
      requestAnimationFrame(() => requestAnimationFrame(() => {
        if (bar) bar.style.width = tl.targetPct + '%';
      }));
    }

    const abgaben     = mainEvents.filter(e => e.type === 'Abgabe');
    const abgabenDone = abgaben.filter(e => doneItems.includes(e.id)).length;
    const next7       = sorted.filter(e => {
      const diff = Math.round((midnight(parseISOString(e.date)) - todayMid) / 86400000);
      return diff >= 0 && diff <= 7;
    }).length;

    document.getElementById('stats-line').innerHTML =
      `<b>${mainEvents.length}</b> Termine · <b>${abgabenDone}/${abgaben.length}</b> Abgaben erledigt · <b>${next7}</b> in &le; 7 Tagen`;

    const listEl = document.getElementById('list');
    listEl.innerHTML = '';
    if (sorted.length === 0) {
      listEl.innerHTML = `<div class="empty-state">Keine offenen Termine.</div>`;
      return;
    }

    sorted.forEach((item, idx) => {
      const d        = parseISOString(item.date);
      const diffDays = Math.round((midnight(d) - todayMid) / 86400000);
      const diffWeeks = (diffDays / 7).toFixed(1).replace('.', ',');
      const isAbgabe = item.type === 'Abgabe';
      const isDone   = isAbgabe && doneItems.includes(item.id);

      let countdownClass = '', countdownContent = '';
      if (isDone) {
        countdownClass   = 'done-badge';
        countdownContent = `<span class="primary">Erledigt</span><span class="secondary">abgehakt</span>`;
      } else if (diffDays < 0) {
        countdownClass   = 'expired';
        countdownContent = `<span class="primary">Abgelaufen</span><span class="secondary">vor ${Math.abs(diffDays)} Tg.</span>`;
      } else if (diffDays === 0) {
        countdownClass   = 'urgent';
        countdownContent = `<span class="primary">Heute</span><span class="secondary">${item.time}</span>`;
      } else {
        if (diffDays <= 7) countdownClass = 'urgent';
        countdownContent = `<span class="primary">${diffDays} Tag${diffDays !== 1 ? 'e' : ''}</span><span class="secondary">${diffWeeks} Wo.</span>`;
      }

      const checkElement = isAbgabe
        ? `<input type="checkbox" onchange="toggleDone('${item.id}')" ${isDone ? 'checked' : ''} aria-label="${escapeHtml(item.title)} erledigt">`
        : `<div class="dot-marker"></div>`;

      const card = document.createElement('div');
      card.className = `card ${isDone ? 'done' : ''} ${animate ? 'enter' : ''}`;
      if (animate) card.style.setProperty('--delay', (idx * 0.035) + 's');
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-left">
            <div class="checkbox-wrapper">${checkElement}</div>
            <div class="info">
              <span class="badge ${typeClass(item.type)}">${item.type}</span>
              <div class="title">${escapeHtml(item.title)}</div>
              <div class="meta">${formatDate(d)} · ${item.time}</div>
            </div>
          </div>
          <div class="countdown ${countdownClass}">${countdownContent}</div>
        </div>
      `;
      listEl.appendChild(card);
    });

    if (calVisible) renderCalendar();
  }

  document.getElementById('cal-toggle-btn').addEventListener('click', toggleCalendar);
  document.getElementById('cal-prev').addEventListener('click', () => calNav(-1));
  document.getElementById('cal-next').addEventListener('click', () => calNav(+1));

  (async function init() {
    await loadDoneItems();
    render(true);
    setInterval(() => render(false), 60000);
  })();
</script>
</body>
</html>
